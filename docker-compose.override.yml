# Local dev overrides for `docker compose up -d db redis`.
# Exposes db + redis to the host and matches the password in .env so the
# NestJS server (running on the host via `pnpm run dev`) can connect.
services:
  db:
    environment:
      POSTGRES_PASSWORD: docmostdev
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"
