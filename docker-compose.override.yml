# Local dev / self-host overrides.
# - db + redis exposed to the host (kept for host-side tooling / migrations).
# - docmost: run OUR built ConqrHub image (Plane-aligned UI + app switcher +
#   shared theme) as a persistent container with restart: unless-stopped, so the
#   backend no longer gets reaped. Served on host :5173 (unchanged URL), talking
#   to db/redis over the compose network.
services:
  db:
    environment:
      POSTGRES_PASSWORD: docmostdev
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  docmost:
    image: conqrhub/app:local
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      APP_URL: "http://localhost:5173"
      APP_SECRET: "7f748fee1832faa75a05e57d2ba683f754c12806c75030543e8a0550d6b6ce0b"
      DATABASE_URL: "postgresql://docmost:docmostdev@db:5432/docmost"
      REDIS_URL: "redis://redis:6379"
      STORAGE_DRIVER: "local"
      # Conqr suite single sign-on (Keycloak). The issuer is the STABLE custom
      # hostname `keycloak.conqr.local`, pinned on Keycloak via KC_HOSTNAME so the
      # browser AND this container resolve the SAME issuer regardless of LAN IP:
      #   - browser: Windows hosts entry `127.0.0.1  keycloak.conqr.local`
      #   - container: extra_hosts `keycloak.conqr.local:host-gateway` (below)
      # Drift-proof — no edits needed when the machine's LAN address changes.
      # Put the real secret in the shell/.env as OIDC_CLIENT_SECRET.
      OIDC_ENABLED: "true"
      OIDC_ISSUER_URL: "http://kubernetes.docker.internal:8080/realms/conqr"
      OIDC_CLIENT_ID: "conqrhub"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-changeme}"
      OIDC_REDIRECT_URI: "http://localhost:5173/api/auth/oidc/callback"
      # Cross-product API access (blueprint §5.2A): Plane's origin may call the
      # credentialed /integrations API from the browser.
      CORS_ALLOWED_ORIGINS: "http://localhost"
      # Plane deep links (app switcher, palette, resolver)
      PLANE_APP_URL: "http://localhost"
      # Plane REST adapter (integration layer) — Plane's proxy on the host
      PLANE_API_URL: "http://host.docker.internal/api/v1"
      PLANE_API_KEY: "${PLANE_API_KEY:-}"
      PLANE_WORKSPACE_SLUG: "${PLANE_WORKSPACE_SLUG:-conqrai}"
      # ConqrHub as the suite IdP (§9.1): Plane trusts the Hub session — being
      # signed into the Hub signs Plane in with the same identity, silently.
      SUITE_IDP_CLIENTS: "${SUITE_IDP_CLIENTS:-plane|plane-suite-secret|http://localhost/auth/oidc/callback/}"
      # Meeting intelligence: Speechmatics batch transcription + Conqr AI
      # analysis. Real values live in ConqrHub/.env (compose interpolates).
      SPEECHMATICS_API_KEY: "${SPEECHMATICS_API_KEY:-}"
      SPEECHMATICS_REGION: "${SPEECHMATICS_REGION:-eu1}"
      SPEECHMATICS_OPERATING_POINT: "${SPEECHMATICS_OPERATING_POINT:-enhanced}"
      AI_DRIVER: "${AI_DRIVER:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.conqr.local:host-gateway"
      - "kubernetes.docker.internal:host-gateway"
